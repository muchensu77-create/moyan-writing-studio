<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill - 写手匹配工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="skill-common.css">
</head>
<body>
    <div class="skill-topbar">
        <div class="skill-topbar-left">
            <a href="index.html" class="back-btn">&#8592; 返回</a>
            <h1>写手匹配 / Assign</h1>
        </div>
        <span class="badge badge-internal">内部流程</span>
    </div>

    <div class="skill-container">
        <div class="skill-intro">
            <h2>写手匹配工具</h2>
            <p>根据订单需求填写匹配条件，记录分配结果，生成分配摘要用于内部存档。</p>
        </div>

        <form id="skillForm">
            <!-- 订单信息 -->
            <div class="form-section">
                <div class="form-section-title">订单信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>订单编号 <span class="required">*</span></label>
                        <input type="text" id="orderId" required placeholder="如：ORD-20240315-001">
                    </div>
                    <div class="form-group">
                        <label>订单类型 <span class="required">*</span></label>
                        <select id="orderType" required>
                            <option value="">请选择</option>
                            <option>课程论文</option>
                            <option>毕业论文</option>
                            <option>数据分析</option>
                            <option>留学文书</option>
                            <option>编程代做</option>
                            <option>润色降重</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>学科 / 专业 <span class="required">*</span></label>
                        <input type="text" id="subject" required placeholder="如：计算机科学、市场营销">
                    </div>
                    <div class="form-group">
                        <label>难度等级</label>
                        <div class="option-group">
                            <label><input type="radio" name="difficulty" value="普通"><span>普通</span></label>
                            <label><input type="radio" name="difficulty" value="中等"><span>中等</span></label>
                            <label><input type="radio" name="difficulty" value="较难"><span>较难</span></label>
                            <label><input type="radio" name="difficulty" value="极难"><span>极难</span></label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 匹配条件 -->
            <div class="form-section">
                <div class="form-section-title">匹配条件</div>
                <div class="form-group">
                    <label>要求学历</label>
                    <div class="option-group">
                        <label><input type="radio" name="eduLevel" value="本科"><span>本科</span></label>
                        <label><input type="radio" name="eduLevel" value="硕士"><span>硕士</span></label>
                        <label><input type="radio" name="eduLevel" value="博士"><span>博士</span></label>
                    </div>
                </div>
                <div class="form-group">
                    <label>专业匹配</label>
                    <div class="option-group">
                        <label><input type="radio" name="majorMatch" value="精确"><span>精确</span></label>
                        <label><input type="radio" name="majorMatch" value="相近"><span>相近</span></label>
                        <label><input type="radio" name="majorMatch" value="跨学科"><span>跨学科</span></label>
                    </div>
                </div>
                <div class="form-group">
                    <label>语言能力</label>
                    <div class="option-group">
                        <label><input type="radio" name="langAbility" value="中文"><span>中文</span></label>
                        <label><input type="radio" name="langAbility" value="英文"><span>英文</span></label>
                        <label><input type="radio" name="langAbility" value="双语"><span>双语</span></label>
                    </div>
                </div>
            </div>

            <!-- 写手信息 -->
            <div class="form-section">
                <div class="form-section-title">分配写手信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>写手编号 / 昵称 <span class="required">*</span></label>
                        <input type="text" id="writerId" required placeholder="如：W-012 / 小明">
                    </div>
                    <div class="form-group">
                        <label>写手评级</label>
                        <div class="option-group">
                            <label><input type="radio" name="writerGrade" value="A"><span>A 级</span></label>
                            <label><input type="radio" name="writerGrade" value="B"><span>B 级</span></label>
                            <label><input type="radio" name="writerGrade" value="C"><span>C 级</span></label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>历史完成量</label>
                        <input type="text" id="writerHistory" placeholder="如：32单">
                    </div>
                    <div class="form-group">
                        <label>写手备注</label>
                        <input type="text" id="writerNote" placeholder="如：擅长理工科、英文写作强">
                    </div>
                </div>
            </div>

            <!-- 分配备注 -->
            <div class="form-section">
                <div class="form-section-title">分配备注</div>
                <div class="form-group">
                    <label>补充说明</label>
                    <textarea id="notes" placeholder="如：客户有特殊要求请提前告知写手、注意截止时间等"></textarea>
                </div>
            </div>

            <div class="btn-row">
                <button type="button" class="btn btn-primary" onclick="generateSummary()">生成分配摘要</button>
                <button type="reset" class="btn btn-secondary">清空表单</button>
            </div>
        </form>

        <div class="output-area" id="outputArea">
            <h3>分配摘要</h3>
            <div class="output-content" id="outputContent"></div>
            <button class="copy-btn" onclick="copySummary()">复制到剪贴板</button>
        </div>
    </div>

    <script>
    function getVal(id) { return document.getElementById(id)?.value?.trim() || '-'; }
    function getRadio(name) {
        const el = document.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : '-';
    }
    function getChecked(name) {
        const els = document.querySelectorAll(`input[name="${name}"]:checked`);
        return els.length ? Array.from(els).map(e => e.value).join('、') : '-';
    }

    function generateSummary() {
        const form = document.getElementById('skillForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const summary = `【写手分配摘要】
============================
订单编号：${getVal('orderId')}
订单类型：${getVal('orderType')}
学科/专业：${getVal('subject')}
难度等级：${getRadio('difficulty')}
---
要求学历：${getRadio('eduLevel')}
专业匹配：${getRadio('majorMatch')}
语言能力：${getRadio('langAbility')}
---
分配写手：${getVal('writerId')}
写手评级：${getRadio('writerGrade')}
历史完成量：${getVal('writerHistory')}
写手备注：${getVal('writerNote')}
---
分配备注：${getVal('notes')}
============================
操作时间：${new Date().toLocaleString('zh-CN')}`;

        document.getElementById('outputContent').textContent = summary;
        document.getElementById('outputArea').classList.add('visible');
        document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });
    }

    function copySummary() {
        const text = document.getElementById('outputContent').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = '复制到剪贴板', 2000);
        });
    }
    </script>
</body>
</html>
