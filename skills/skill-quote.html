<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill - 报价计算工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="skill-common.css">
</head>
<body>
    <div class="skill-topbar">
        <div class="skill-topbar-left">
            <a href="index.html" class="back-btn">&#8592; 返回</a>
            <h1>报价计算 / Quote</h1>
        </div>
        <span class="badge badge-internal">内部流程</span>
    </div>

    <div class="skill-container">
        <div class="skill-intro">
            <h2>报价计算工具</h2>
            <p>根据订单参数自动计算参考报价，生成报价摘要供内部参考与客户沟通。</p>
        </div>

        <form id="skillForm">
            <!-- 订单信息 -->
            <div class="form-section">
                <div class="form-section-title">订单信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>订单类型 <span class="required">*</span></label>
                        <select id="orderType" required>
                            <option value="">请选择</option>
                            <option>课程论文</option>
                            <option>毕业论文</option>
                            <option>数据分析</option>
                            <option>留学文书</option>
                            <option>编程代做</option>
                            <option>润色降重</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>字数 / 工作量 <span class="required">*</span></label>
                        <input type="text" id="workload" required placeholder="如：5000字 / 3个功能模块">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>学科难度 <span class="required">*</span></label>
                        <div class="option-group">
                            <label><input type="radio" name="difficulty" value="普通" required><span>普通</span></label>
                            <label><input type="radio" name="difficulty" value="中等"><span>中等</span></label>
                            <label><input type="radio" name="difficulty" value="较难"><span>较难</span></label>
                            <label><input type="radio" name="difficulty" value="极难"><span>极难</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>语言</label>
                        <div class="option-group">
                            <label><input type="radio" name="language" value="中文"><span>中文</span></label>
                            <label><input type="radio" name="language" value="英文"><span>英文</span></label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 时间系数 -->
            <div class="form-section">
                <div class="form-section-title">时间系数</div>
                <div class="form-group">
                    <label>截止时间 <span class="required">*</span></label>
                    <select id="deadline" required>
                        <option value="">请选择</option>
                        <option value="7天以上">7天以上（标准价）</option>
                        <option value="3-7天">3-7天（+20%）</option>
                        <option value="1-3天">1-3天（+50%）</option>
                        <option value="24小时内">24小时内（+100%）</option>
                    </select>
                </div>
            </div>

            <!-- 附加服务 -->
            <div class="form-section">
                <div class="form-section-title">附加服务</div>
                <div class="form-group">
                    <label>附加项目（多选）</label>
                    <div class="option-group">
                        <label><input type="checkbox" name="extra" value="加急"><span>加急</span></label>
                        <label><input type="checkbox" name="extra" value="查重报告"><span>查重报告</span></label>
                        <label><input type="checkbox" name="extra" value="答辩PPT"><span>答辩PPT</span></label>
                        <label><input type="checkbox" name="extra" value="代码讲解"><span>代码讲解</span></label>
                        <label><input type="checkbox" name="extra" value="额外修改"><span>额外修改</span></label>
                    </div>
                </div>
            </div>

            <!-- 报价参数 -->
            <div class="form-section">
                <div class="form-section-title">报价参数</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>基础单价（元）<span class="required">*</span></label>
                        <input type="number" id="basePrice" required placeholder="如：0.15（每字）或固定金额">
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="priceNote" placeholder="如：按字计费/按项目计费">
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button type="button" class="btn btn-primary" onclick="generateSummary()">计算报价摘要</button>
                <button type="reset" class="btn btn-secondary">清空表单</button>
            </div>
        </form>

        <div class="output-area" id="outputArea">
            <h3>报价摘要</h3>
            <div class="output-content" id="outputContent"></div>
            <button class="copy-btn" onclick="copySummary()">复制到剪贴板</button>
        </div>
    </div>

    <script>
    function getVal(id) { return document.getElementById(id)?.value?.trim() || '-'; }
    function getRadio(name) {
        const el = document.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : '-';
    }
    function getChecked(name) {
        const els = document.querySelectorAll(`input[name="${name}"]:checked`);
        return els.length ? Array.from(els).map(e => e.value).join('、') : '无';
    }

    function getDifficultyCoeff() {
        const d = getRadio('difficulty');
        if (d === '中等') return 1.2;
        if (d === '较难') return 1.5;
        if (d === '极难') return 2.0;
        return 1.0;
    }

    function getTimeCoeff() {
        const t = getVal('deadline');
        if (t === '3-7天') return 1.2;
        if (t === '1-3天') return 1.5;
        if (t === '24小时内') return 2.0;
        return 1.0;
    }

    function getLangCoeff() {
        return getRadio('language') === '英文' ? 1.3 : 1.0;
    }

    function generateSummary() {
        const form = document.getElementById('skillForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const base = parseFloat(getVal('basePrice')) || 0;
        const diffCoeff = getDifficultyCoeff();
        const timeCoeff = getTimeCoeff();
        const langCoeff = getLangCoeff();
        const total = (base * diffCoeff * timeCoeff * langCoeff).toFixed(2);

        const summary = `【报价计算摘要】
============================
订单类型：${getVal('orderType')}
字数/工作量：${getVal('workload')}
学科难度：${getRadio('difficulty')}
语言：${getRadio('language')}
截止时间：${getVal('deadline')}
附加服务：${getChecked('extra')}
---
基础单价：${base} 元
难度系数：x${diffCoeff}
时间系数：x${timeCoeff}
语言系数：x${langCoeff}
---
参考报价：${total} 元
备注：${getVal('priceNote')}
============================
计算时间：${new Date().toLocaleString('zh-CN')}`;

        document.getElementById('outputContent').textContent = summary;
        document.getElementById('outputArea').classList.add('visible');
        document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });
    }

    function copySummary() {
        const text = document.getElementById('outputContent').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = '复制到剪贴板', 2000);
        });
    }
    </script>
</body>
</html>
