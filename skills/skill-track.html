<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill - 进度跟踪工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="skill-common.css">
</head>
<body>
    <div class="skill-topbar">
        <div class="skill-topbar-left">
            <a href="index.html" class="back-btn">&#8592; 返回</a>
            <h1>进度跟踪 / Track</h1>
        </div>
        <span class="badge badge-internal">内部流程</span>
    </div>

    <div class="skill-container">
        <div class="skill-intro">
            <h2>进度跟踪工具</h2>
            <p>填写订单当前状态与时间节点，生成进度摘要用于内部同步与客户反馈。</p>
        </div>

        <form id="skillForm">
            <!-- 订单信息 -->
            <div class="form-section">
                <div class="form-section-title">订单信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>订单编号 <span class="required">*</span></label>
                        <input type="text" id="orderId" required placeholder="如：ORD-20240315-001">
                    </div>
                    <div class="form-group">
                        <label>客户称呼</label>
                        <input type="text" id="clientName" placeholder="如：张同学">
                    </div>
                </div>
                <div class="form-group">
                    <label>订单类型 <span class="required">*</span></label>
                    <select id="orderType" required>
                        <option value="">请选择</option>
                        <option>课程论文</option>
                        <option>毕业论文</option>
                        <option>数据分析</option>
                        <option>留学文书</option>
                        <option>编程代做</option>
                        <option>润色降重</option>
                    </select>
                </div>
            </div>

            <!-- 状态更新 -->
            <div class="form-section">
                <div class="form-section-title">状态更新</div>
                <div class="form-group">
                    <label>当前状态 <span class="required">*</span></label>
                    <select id="currentStatus" required>
                        <option value="">请选择</option>
                        <option>待分配</option>
                        <option>写作中</option>
                        <option>初稿完成</option>
                        <option>质检中</option>
                        <option>已交付</option>
                        <option>修改中</option>
                        <option>已完结</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>完成百分比（%）</label>
                    <input type="number" id="progress" min="0" max="100" placeholder="如：60">
                </div>
                <div class="form-group">
                    <label>当前里程碑</label>
                    <textarea id="milestone" placeholder="如：已完成文献综述部分，正在撰写研究方法章节"></textarea>
                </div>
            </div>

            <!-- 时间节点 -->
            <div class="form-section">
                <div class="form-section-title">时间节点</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group">
                        <label>计划交付日期 <span class="required">*</span></label>
                        <input type="date" id="planDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>实际交付日期</label>
                    <input type="date" id="actualDate">
                </div>
            </div>

            <!-- 跟踪备注 -->
            <div class="form-section">
                <div class="form-section-title">跟踪备注</div>
                <div class="form-group">
                    <label>备注 / 风险提示</label>
                    <textarea id="notes" placeholder="如：写手反馈内容较难，预计延期1天；客户已知晓"></textarea>
                </div>
            </div>

            <div class="btn-row">
                <button type="button" class="btn btn-primary" onclick="generateSummary()">生成进度摘要</button>
                <button type="reset" class="btn btn-secondary">清空表单</button>
            </div>
        </form>

        <div class="output-area" id="outputArea">
            <h3>进度摘要</h3>
            <div class="output-content" id="outputContent"></div>
            <button class="copy-btn" onclick="copySummary()">复制到剪贴板</button>
        </div>
    </div>

    <script>
    function getVal(id) { return document.getElementById(id)?.value?.trim() || '-'; }
    function getRadio(name) {
        const el = document.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : '-';
    }
    function getChecked(name) {
        const els = document.querySelectorAll(`input[name="${name}"]:checked`);
        return els.length ? Array.from(els).map(e => e.value).join('、') : '-';
    }

    function generateSummary() {
        const form = document.getElementById('skillForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const progress = getVal('progress');
        const progressBar = progress !== '-' ? `${progress}%` : '-';

        const summary = `【订单进度摘要】
============================
订单编号：${getVal('orderId')}
客户称呼：${getVal('clientName')}
订单类型：${getVal('orderType')}
---
当前状态：${getVal('currentStatus')}
完成进度：${progressBar}
当前里程碑：${getVal('milestone')}
---
开始日期：${getVal('startDate')}
计划交付：${getVal('planDate')}
实际交付：${getVal('actualDate')}
---
跟踪备注：${getVal('notes')}
============================
更新时间：${new Date().toLocaleString('zh-CN')}`;

        document.getElementById('outputContent').textContent = summary;
        document.getElementById('outputArea').classList.add('visible');
        document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });
    }

    function copySummary() {
        const text = document.getElementById('outputContent').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = '复制到剪贴板', 2000);
        });
    }
    </script>
</body>
</html>
