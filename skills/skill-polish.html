<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill - 润色降重需求采集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="skill-common.css">
</head>
<body>
    <div class="skill-topbar">
        <div class="skill-topbar-left">
            <a href="index.html" class="back-btn">&#8592; 返回</a>
            <h1>润色降重 / Polish</h1>
        </div>
        <span class="badge badge-intake">需求采集</span>
    </div>

    <div class="skill-container">
        <div class="skill-intro">
            <h2>润色降重需求采集表</h2>
            <p>与客户沟通时逐项填写，完成后生成需求摘要用于内部流转。</p>
        </div>

        <form id="skillForm">
            <!-- 客户信息 -->
            <div class="form-section">
                <div class="form-section-title">客户信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>客户称呼 <span class="required">*</span></label>
                        <input type="text" id="clientName" required placeholder="如：张同学">
                    </div>
                    <div class="form-group">
                        <label>联系方式 <span class="required">*</span></label>
                        <input type="text" id="clientContact" required placeholder="微信号/手机号">
                    </div>
                </div>
                <div class="form-group">
                    <label>来源渠道</label>
                    <div class="option-group">
                        <label><input type="radio" name="source" value="小红书"><span>小红书</span></label>
                        <label><input type="radio" name="source" value="微信"><span>微信</span></label>
                        <label><input type="radio" name="source" value="老客户推荐"><span>老客户推荐</span></label>
                        <label><input type="radio" name="source" value="其他"><span>其他</span></label>
                    </div>
                </div>
            </div>

            <!-- 文稿信息 -->
            <div class="form-section">
                <div class="form-section-title">文稿信息</div>
                <div class="form-group">
                    <label>服务类型 <span class="required">*</span></label>
                    <div class="option-group">
                        <label><input type="radio" name="serviceType" value="润色" required><span>润色</span></label>
                        <label><input type="radio" name="serviceType" value="降重"><span>降重</span></label>
                        <label><input type="radio" name="serviceType" value="润色+降重"><span>润色+降重</span></label>
                    </div>
                </div>
                <div class="form-group">
                    <label>文稿类型 <span class="required">*</span></label>
                    <div class="option-group">
                        <label><input type="radio" name="docType" value="课程论文"><span>课程论文</span></label>
                        <label><input type="radio" name="docType" value="毕业论文"><span>毕业论文</span></label>
                        <label><input type="radio" name="docType" value="期刊论文"><span>期刊论文</span></label>
                        <label><input type="radio" name="docType" value="其他"><span>其他</span></label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>语言 <span class="required">*</span></label>
                        <div class="option-group">
                            <label><input type="radio" name="language" value="中文"><span>中文</span></label>
                            <label><input type="radio" name="language" value="英文"><span>英文</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>字数 <span class="required">*</span></label>
                        <input type="text" id="wordCount" required placeholder="如：5000字 / 3000words">
                    </div>
                </div>
            </div>

            <!-- 降重信息 -->
            <div class="form-section">
                <div class="form-section-title">降重信息 <span style="font-weight:400;color:var(--text-light);font-size:0.8rem;margin-left:8px;text-transform:none;letter-spacing:0">（如服务类型含降重则填写）</span></div>
                <div class="form-row">
                    <div class="form-group">
                        <label>当前查重率</label>
                        <input type="text" id="currentRate" placeholder="如：35%">
                    </div>
                    <div class="form-group">
                        <label>目标查重率</label>
                        <input type="text" id="targetRate" placeholder="如：低于15%">
                    </div>
                </div>
                <div class="form-group">
                    <label>查重系统</label>
                    <div class="option-group">
                        <label><input type="radio" name="plagSystem" value="知网"><span>知网</span></label>
                        <label><input type="radio" name="plagSystem" value="Turnitin"><span>Turnitin</span></label>
                        <label><input type="radio" name="plagSystem" value="维普"><span>维普</span></label>
                        <label><input type="radio" name="plagSystem" value="万方"><span>万方</span></label>
                    </div>
                </div>
            </div>

            <!-- 润色信息 -->
            <div class="form-section">
                <div class="form-section-title">润色信息 <span style="font-weight:400;color:var(--text-light);font-size:0.8rem;margin-left:8px;text-transform:none;letter-spacing:0">（如服务类型含润色则填写）</span></div>
                <div class="form-group">
                    <label>润色程度</label>
                    <div class="option-group">
                        <label><input type="radio" name="polishLevel" value="轻度"><span>轻度</span></label>
                        <label><input type="radio" name="polishLevel" value="中度"><span>中度</span></label>
                        <label><input type="radio" name="polishLevel" value="深度"><span>深度</span></label>
                    </div>
                </div>
                <div class="form-group">
                    <label>是否需要学术格式调整</label>
                    <div class="option-group">
                        <label><input type="radio" name="formatAdjust" value="是"><span>是</span></label>
                        <label><input type="radio" name="formatAdjust" value="否"><span>否</span></label>
                    </div>
                </div>
            </div>

            <!-- 文件与时间 -->
            <div class="form-section">
                <div class="form-section-title">文件与时间</div>
                <div class="form-group">
                    <label>是否有原文件</label>
                    <div class="option-group">
                        <label><input type="radio" name="hasFile" value="有，已发送"><span>有，已发送</span></label>
                        <label><input type="radio" name="hasFile" value="有，待发送"><span>有，待发送</span></label>
                        <label><input type="radio" name="hasFile" value="暂无"><span>暂无</span></label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>截止日期 <span class="required">*</span></label>
                        <input type="date" id="deadline" required>
                    </div>
                    <div class="form-group">
                        <label>是否加急</label>
                        <select id="urgent">
                            <option value="否">否（正常排期）</option>
                            <option value="轻度加急">轻度加急（3天内）</option>
                            <option value="紧急">紧急（24-48小时）</option>
                            <option value="特急">特急（24小时内）</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>客户预算范围</label>
                    <input type="text" id="budget" placeholder="如：200左右 / 不超过500">
                </div>
            </div>

            <!-- 备注 -->
            <div class="form-section">
                <div class="form-section-title">其他备注</div>
                <div class="form-group">
                    <label>特殊要求 / 补充说明</label>
                    <textarea id="notes" placeholder="如：保留原文核心观点、不改变句子逻辑等"></textarea>
                </div>
            </div>

            <div class="btn-row">
                <button type="button" class="btn btn-primary" onclick="generateSummary()">生成需求摘要</button>
                <button type="reset" class="btn btn-secondary">清空表单</button>
            </div>
        </form>

        <div class="output-area" id="outputArea">
            <h3>需求摘要</h3>
            <div class="output-content" id="outputContent"></div>
            <button class="copy-btn" onclick="copySummary()">复制到剪贴板</button>
        </div>
    </div>

    <script>
    function getVal(id) { return document.getElementById(id)?.value?.trim() || '-'; }
    function getRadio(name) {
        const el = document.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : '-';
    }
    function getChecked(name) {
        const els = document.querySelectorAll(`input[name="${name}"]:checked`);
        return els.length ? Array.from(els).map(e => e.value).join('、') : '-';
    }

    function generateSummary() {
        const form = document.getElementById('skillForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const summary = `【润色降重需求单】
============================
客户：${getVal('clientName')}
联系方式：${getVal('clientContact')}
来源：${getRadio('source')}
---
服务类型：${getRadio('serviceType')}
文稿类型：${getRadio('docType')}
语言：${getRadio('language')}
字数：${getVal('wordCount')}
---
当前查重率：${getVal('currentRate')}
目标查重率：${getVal('targetRate')}
查重系统：${getRadio('plagSystem')}
---
润色程度：${getRadio('polishLevel')}
学术格式调整：${getRadio('formatAdjust')}
---
原文件：${getRadio('hasFile')}
截止日期：${getVal('deadline')}
是否加急：${getVal('urgent')}
客户预算：${getVal('budget')}
---
备注：${getVal('notes')}
============================
采集时间：${new Date().toLocaleString('zh-CN')}`;

        document.getElementById('outputContent').textContent = summary;
        document.getElementById('outputArea').classList.add('visible');
        document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });
    }

    function copySummary() {
        const text = document.getElementById('outputContent').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = '复制到剪贴板', 2000);
        });
    }
    </script>
</body>
</html>
